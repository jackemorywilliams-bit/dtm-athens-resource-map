name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Enforcement wall (verify.py)
        run: python3 verify.py
      - name: Build check (build.py)
        run: python3 build.py
